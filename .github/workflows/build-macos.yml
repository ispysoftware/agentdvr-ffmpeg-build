name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ffmpeg_ver:
        description: 'FFmpeg version (e.g. 8.1)'
        required: false
        default: '8.1'
      arch:
        description: 'Target architecture'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - arm64
          - x86_64

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-latest
            target_arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve FFmpeg version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "val=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "val=${{ inputs.ffmpeg_ver }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (${{ matrix.arch }})
        if: github.event_name == 'push' || inputs.arch == 'all' || inputs.arch == matrix.arch
        env:
          FFMPEG_VER: ${{ steps.ver.outputs.val }}
          TARGET_ARCH: ${{ matrix.target_arch || matrix.arch }}
        run: bash ./build_macos.sh

      - name: Publish to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: out/*

      - name: Upload workflow artifact
        if: "github.event_name == 'workflow_dispatch' && (inputs.arch == 'all' || inputs.arch == matrix.arch)"
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-${{ matrix.arch }}-${{ steps.ver.outputs.val }}
          path: out/*
          retention-days: 90
