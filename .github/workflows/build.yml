# ============================================================================
# FFmpeg cross-build — GitHub Actions
#
# Triggers:
#   • Push a version tag  (e.g. git tag v8.1 && git push origin v8.1)
#     → builds all 4 targets in parallel, attaches archives to a GitHub Release
#   • workflow_dispatch
#     → manual run from the Actions UI; choose a target and version override;
#       outputs are uploaded as workflow artifacts (90-day retention)
#
# Targets run in parallel on ubuntu-latest (native x86_64 runners).
# All cross-compilation is done inside the Docker container via GCC cross-
# toolchains — no QEMU emulation needed, so arm64/armhf builds are fast.
#
# Requirements:
#   • The default GITHUB_TOKEN is sufficient (contents: write for releases).
#   • No secrets needed unless you add a CDN-upload step later.
# ============================================================================

name: Build FFmpeg

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      ffmpeg_ver:
        description: 'FFmpeg version (e.g. 8.1). Defaults to 8.1.'
        required: false
        default: '8.1'
      arch:
        description: 'Target to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - x64
          - arm64
          - armhf
          - win64
          - macos

jobs:
  # --------------------------------------------------------------------------
  # Build — one job per target, all running in parallel
  # --------------------------------------------------------------------------
  build:
    name: ${{ matrix.arch }}
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create/update GitHub Releases

    timeout-minutes: 120

    strategy:
      fail-fast: false  # let other arches finish even if one fails
      matrix:
        arch: [x64, arm64, armhf, win64]
        # For workflow_dispatch with a specific arch we skip non-matching jobs
        # (GitHub doesn't support dynamic matrices from inputs natively, so we
        # use an 'if' guard below instead.)

    # Skip jobs that don't match the arch chosen in a manual dispatch
    if: >
      github.event_name == 'push' ||
      inputs.arch == 'all' ||
      inputs.arch == matrix.arch

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Resolve FFmpeg version ──────────────────────────────────────────
      #   Tag push  → strip leading 'v' from the tag name  (v8.1 → 8.1)
      #   Manual    → use the workflow input (default: 8.1)
      - name: Resolve FFmpeg version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "val=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "val=${{ inputs.ffmpeg_ver }}" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. win64 needs 7-Zip to pack the .7z archive ──────────────────────
      - name: Install 7-Zip
        if: matrix.arch == 'win64'
        run: sudo apt-get install -y p7zip-full

      # ── 4. Build ───────────────────────────────────────────────────────────
      #   build.ps1 runs fine under PowerShell Core (pwsh), which is
      #   pre-installed on all ubuntu-latest runners.
      #   It calls 'docker build --target builder' and then extracts the
      #   archive from the resulting image into ./out/.
      - name: Build (${{ matrix.arch }})
        shell: pwsh
        run: >
          ./build.ps1
          -Arch      ${{ matrix.arch }}
          -FfmpegVer "${{ steps.ver.outputs.val }}"

      # ── 5a. Publish archives to the GitHub Release (tag push only) ─────────
      - name: Publish to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          # Release is created automatically from the tag if it doesn't exist.
          # Each parallel job appends its own archive; no race conditions.
          files: out/*

      # ── 5b. Upload as workflow artifact (manual dispatch) ──────────────────
      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.arch }}-${{ steps.ver.outputs.val }}
          path: out/*
          retention-days: 90

  # --------------------------------------------------------------------------
  # macOS — one job per arch, each running on a native runner
  #
  # macos-latest  = Apple Silicon (arm64)
  # macos-13      = Intel (x86_64)
  #
  # Builds FFmpeg from source via build_macos.sh — same deps and version pins
  # as the Linux Dockerfile.  No Homebrew FFmpeg, no Rosetta, no emulation.
  # Hardware acceleration: VideoToolbox + AudioToolbox (always available,
  # no driver install needed on the target Mac).
  # --------------------------------------------------------------------------
  build-macos:
    name: macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: write

    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-13

    if: >
      github.event_name == 'push' ||
      inputs.arch == 'all' ||
      inputs.arch == 'macos'

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Resolve FFmpeg version ──────────────────────────────────────────
      - name: Resolve FFmpeg version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "val=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "val=${{ inputs.ffmpeg_ver }}" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. Build from source ───────────────────────────────────────────────
      - name: Build (${{ matrix.arch }})
        env:
          FFMPEG_VER: ${{ steps.ver.outputs.val }}
        run: bash ./build_macos.sh

      # ── 4a. Publish to GitHub Release (tag push) ───────────────────────────
      - name: Publish to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: out/*

      # ── 4b. Upload as workflow artifact (manual dispatch) ──────────────────
      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-${{ matrix.arch }}-${{ steps.ver.outputs.val }}
          path: out/*
          retention-days: 90
