name: Build Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ffmpeg_ver:
        description: 'FFmpeg version (e.g. 8.1)'
        required: false
        default: '8.1'
      arch:
        description: 'Target architecture'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - x64
          - arm64
          - armhf

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64, armhf]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve FFmpeg version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "val=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "val=${{ inputs.ffmpeg_ver }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (${{ matrix.arch }})
        if: github.event_name == 'push' || inputs.arch == 'all' || inputs.arch == matrix.arch
        shell: pwsh
        run: ./build.ps1 -Arch ${{ matrix.arch }} -FfmpegVer "${{ steps.ver.outputs.val }}"

      - name: Publish to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: out/*

      - name: Upload workflow artifact
        if: "github.event_name == 'workflow_dispatch' && (inputs.arch == 'all' || inputs.arch == matrix.arch)"
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-${{ matrix.arch }}-${{ steps.ver.outputs.val }}
          path: out/*
          retention-days: 90
